<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mitchell Solutions — Received</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a1020;
    --accent: #2e8b57;
    --accent-dim: rgba(46,139,87,0.12);
    --text: #e8eaed;
    --muted: #6b7280;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(46,139,87,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(46,139,87,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }
  .wrap {
    text-align: center;
    max-width: 480px;
    position: relative;
    z-index: 1;
    animation: fadeUp 0.6s ease both;
  }
  .icon { font-size: 48px; margin-bottom: 28px; display: block; }
  h1 {
    font-size: 40px;
    font-weight: 800;
    letter-spacing: -0.03em;
    margin-bottom: 16px;
    line-height: 1.1;
  }
  h1 em { font-style: normal; color: var(--accent); }
  .divider {
    width: 40px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    margin: 24px auto;
  }
  p {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    line-height: 1.8;
    margin-bottom: 36px;
  }
  a {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    text-decoration: none;
    border: 1px solid rgba(46,139,87,0.3);
    padding: 10px 24px;
    border-radius: 4px;
    background: var(--accent-dim);
    transition: opacity 0.2s;
  }
  a:hover { opacity: 0.8; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <div class="wrap">
    <span class="icon">🙏</span>
    <h1>Got it.<br><em>Thank you.</em></h1>
    <div class="divider"></div>
    <p>Your scoping form has been received. If your project looks like a good fit, you'll hear back within 2 business days. If you don't hear anything, it means it's not the right match — no hard feelings.</p>
    <a href="https://mitchellsolutions.org">← Back to Mitchell Solutions</a>
  </div>
</body>
</html>
